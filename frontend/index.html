<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chriscord</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-darkest:#0e1117; --bg-dark:#1a1d27; --bg-mid:#20232f; --bg-light:#2a2d3e;
  --border:#2e3248; --accent:#7289da; --accent-dim:#4e5d94;
  --green:#43b581; --red:#f04747; --yellow:#faa61a;
  --text:#dcddde; --text-muted:#72767d; --text-strong:#ffffff;
  --sidebar-w:220px; --members-w:200px;
}
body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg-darkest); color:var(--text); height:100vh; overflow:hidden; user-select:none; }
.hidden { display:none !important; }
input,button,textarea { font-family:inherit; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bg-light); border-radius:3px; }

/* SERVER LIST */
#screen-servers { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; height:100vh; padding:40px 20px; overflow-y:auto; }
.servers-header { text-align:center; margin-bottom:32px; }
.servers-header h1 { font-size:2rem; color:var(--accent); letter-spacing:4px; font-weight:800; }
.servers-header p { color:var(--text-muted); margin-top:6px; font-size:.9rem; }
.server-list { width:100%; max-width:480px; display:flex; flex-direction:column; gap:10px; }
.server-card { background:var(--bg-dark); border:1px solid var(--border); border-radius:10px; padding:16px 18px; display:flex; align-items:center; gap:14px; transition:border-color .15s; }
.server-card:hover { border-color:var(--accent-dim); }
.server-icon { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.3rem; font-weight:700; color:#fff; flex-shrink:0; }
.server-info { flex:1; min-width:0; }
.server-info .name { font-weight:700; font-size:1rem; color:var(--text-strong); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.server-info .domain { font-size:.78rem; color:var(--text-muted); margin-top:2px; }
.server-info .lastuser { font-size:.75rem; color:var(--accent); margin-top:1px; }
.server-actions { display:flex; gap:6px; }
.btn { padding:7px 16px; border-radius:6px; border:none; font-size:.85rem; font-weight:600; cursor:pointer; transition:filter .15s; }
.btn:hover { filter:brightness(1.15); }
.btn-primary { background:var(--accent); color:#fff; }
.btn-ghost { background:var(--bg-light); color:var(--text); }
.btn-danger { background:var(--red); color:#fff; }
.btn-sm { padding:5px 10px; font-size:.78rem; }
.btn-add-server { width:100%; max-width:480px; margin-top:10px; padding:13px; border-radius:10px; border:2px dashed var(--border); background:transparent; color:var(--text-muted); font-size:.9rem; font-weight:600; cursor:pointer; transition:border-color .15s,color .15s; }
.btn-add-server:hover { border-color:var(--accent); color:var(--accent); }
.empty-hint { color:var(--text-muted); font-style:italic; font-size:.9rem; margin-top:16px; text-align:center; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:100; }
.modal { background:var(--bg-dark); border:1px solid var(--border); border-radius:12px; padding:28px 30px; width:420px; max-width:95vw; }
.modal h2 { font-size:1.2rem; color:var(--text-strong); margin-bottom:20px; }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:.78rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); margin-bottom:5px; }
.form-group input { width:100%; padding:9px 12px; border-radius:6px; border:1px solid var(--border); background:var(--bg-darkest); color:var(--text-strong); font-size:.9rem; outline:none; transition:border-color .15s; }
.form-group input:focus { border-color:var(--accent); }
.form-group .hint { font-size:.75rem; color:var(--text-muted); margin-top:4px; }
.modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }
.error-msg { background:rgba(240,71,71,.12); border:1px solid var(--red); border-radius:6px; padding:8px 12px; font-size:.85rem; color:var(--red); margin-bottom:12px; }

/* CHAT SCREEN */
#screen-chat { display:flex; height:100vh; }

/* Sidebar */
#sidebar { width:var(--sidebar-w); background:var(--bg-dark); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
#sidebar-header { padding:14px 16px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
#sidebar-header .server-name { font-weight:800; font-size:.95rem; color:var(--text-strong); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#back-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem; padding:2px 4px; border-radius:4px; flex-shrink:0; }
#back-btn:hover { background:var(--bg-light); color:var(--text); }
#room-list { flex:1; overflow-y:auto; padding:8px 0; }
.room-header { padding:6px 8px 4px 12px; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); display:flex; align-items:center; gap:4px; cursor:pointer; border-radius:4px; margin:0 4px; }
.room-header:hover { color:var(--text); background:var(--bg-light); }
.room-arrow { font-size:.65rem; transition:transform .15s; }
.room-arrow.open { transform:rotate(90deg); }
.board-item { padding:5px 8px 5px 24px; margin:1px 4px; border-radius:4px; font-size:.9rem; color:var(--text-muted); cursor:pointer; display:flex; align-items:center; gap:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.board-item::before { content:'#'; font-weight:700; }
.board-item:hover { background:var(--bg-light); color:var(--text); }
.board-item.active { background:var(--bg-light); color:var(--text-strong); font-weight:600; }
#sidebar-user { padding:10px 12px; border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; background:var(--bg-mid); }
.user-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; color:#fff; flex-shrink:0; }
.user-name { font-size:.85rem; font-weight:600; color:var(--text-strong); }
.status-dot { width:8px; height:8px; border-radius:50%; background:var(--green); margin-left:auto; flex-shrink:0; }

/* Main chat */
#chat-main { flex:1; display:flex; flex-direction:column; min-width:0; background:var(--bg-darkest); position:relative; }
#chat-header { height:48px; padding:0 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; background:var(--bg-darkest); flex-shrink:0; }
#chat-header .board-title { font-weight:700; font-size:1rem; color:var(--text-strong); }
#chat-header .board-title::before { content:'# '; color:var(--text-muted); font-weight:400; }
#chat-header .no-board { color:var(--text-muted); font-style:italic; }
#toggle-members-btn { margin-left:auto; background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:.85rem; font-weight:600; padding:4px 8px; border-radius:4px; display:flex; align-items:center; gap:5px; transition:background .15s,color .15s; white-space:nowrap; }
#toggle-members-btn:hover { background:var(--bg-light); color:var(--text); }
#toggle-members-btn.active { color:var(--accent); }

/* Drop overlay */
#drop-overlay { position:absolute; inset:0; background:rgba(114,137,218,.15); border:3px dashed var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; z-index:50; pointer-events:none; font-size:1.5rem; font-weight:700; color:var(--accent); gap:12px; }

#messages { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; }

/* Message groups */
.msg-group { display:flex; gap:12px; padding:4px 8px; border-radius:4px; transition:background .1s; position:relative; }
.msg-group:hover { background:rgba(255,255,255,.025); }
.msg-group:hover .msg-actions { opacity:1; }
.msg-avatar { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; color:#fff; margin-top:2px; }
.msg-body { flex:1; min-width:0; }
.msg-meta { display:flex; align-items:baseline; gap:8px; margin-bottom:2px; }
.msg-username { font-weight:700; font-size:.9rem; color:var(--text-strong); }
.msg-time { font-size:.72rem; color:var(--text-muted); }
.msg-edited-tag { font-size:.68rem; color:var(--text-muted); font-style:italic; }
.msg-content { font-size:.9rem; line-height:1.5; color:var(--text); word-break:break-word; white-space:pre-wrap; user-select:text; }

/* Inline edit */
.msg-edit-wrap { display:flex; flex-direction:column; gap:6px; margin-top:4px; }
.msg-edit-input { background:var(--bg-light); border:1px solid var(--accent-dim); border-radius:6px; color:var(--text-strong); font-size:.9rem; padding:8px 10px; outline:none; resize:none; width:100%; }
.msg-edit-input:focus { border-color:var(--accent); }
.msg-edit-actions { display:flex; gap:6px; font-size:.78rem; }
.msg-edit-actions button { padding:3px 10px; border-radius:4px; border:none; cursor:pointer; font-size:.78rem; font-weight:600; }
.msg-edit-save   { background:var(--accent); color:#fff; }
.msg-edit-cancel { background:var(--bg-light); color:var(--text); }

/* 3-dot action menu */
.msg-actions { position:absolute; top:2px; right:8px; opacity:0; transition:opacity .1s; display:flex; gap:2px; }
.msg-action-btn { background:var(--bg-light); border:1px solid var(--border); border-radius:4px; color:var(--text-muted); cursor:pointer; font-size:.9rem; padding:2px 7px; line-height:1.4; transition:background .1s,color .1s; }
.msg-action-btn:hover { background:var(--bg-mid); color:var(--text); }
.msg-dropdown { position:absolute; top:26px; right:0; background:var(--bg-dark); border:1px solid var(--border); border-radius:8px; padding:4px; min-width:140px; z-index:60; box-shadow:0 4px 20px rgba(0,0,0,.4); }
.msg-dropdown-item { display:flex; align-items:center; gap:8px; padding:7px 12px; border-radius:4px; font-size:.85rem; cursor:pointer; color:var(--text); white-space:nowrap; }
.msg-dropdown-item:hover { background:var(--bg-light); }
.msg-dropdown-item.danger { color:var(--red); }
.msg-dropdown-item.danger:hover { background:rgba(240,71,71,.12); }

/* Attachments */
.msg-image { max-width:400px; max-height:300px; border-radius:8px; margin-top:6px; display:block; cursor:zoom-in; object-fit:contain; border:1px solid var(--border); }
.msg-video { max-width:480px; border-radius:8px; margin-top:6px; display:block; border:1px solid var(--border); background:#000; }
.msg-audio { width:320px; margin-top:6px; display:block; }
.msg-file-chip { display:inline-flex; align-items:center; gap:8px; margin-top:6px; padding:8px 12px; background:var(--bg-light); border:1px solid var(--border); border-radius:8px; cursor:pointer; color:var(--text); font-size:.85rem; transition:border-color .15s; user-select:text; }
.msg-file-chip:hover { border-color:var(--accent); }
.msg-file-chip .fname { font-weight:600; color:var(--text-strong); }

/* Lightbox */
#lightbox { position:fixed; inset:0; background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:center; z-index:200; cursor:zoom-out; }
#lightbox img { max-width:90vw; max-height:90vh; object-fit:contain; border-radius:6px; }

/* Input area */
#input-area { padding:0 20px 16px; flex-shrink:0; }

/* Attach queue */
#attach-queue { display:flex; flex-wrap:wrap; gap:6px; padding:8px 14px; background:var(--bg-mid); border:1px solid var(--border); border-radius:8px 8px 0 0; border-bottom:none; }
#attach-queue.empty { display:none; }
#attach-queue + #input-wrap { border-radius:0 0 8px 8px; }
.attach-chip { display:flex; align-items:center; gap:6px; background:var(--bg-light); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:.8rem; color:var(--text); max-width:200px; }
.attach-chip .chip-name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
.attach-chip .chip-status { font-size:.7rem; color:var(--text-muted); }
.attach-chip .chip-remove { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem; padding:0; line-height:1; flex-shrink:0; }
.attach-chip .chip-remove:hover { color:var(--red); }

#input-wrap { display:flex; align-items:center; background:var(--bg-light); border-radius:8px; border:1px solid var(--border); padding:0 12px; gap:8px; transition:border-color .15s; }
#input-wrap:focus-within { border-color:var(--accent-dim); }
#attach-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.2rem; padding:4px 2px; transition:color .15s; line-height:1; flex-shrink:0; }
#attach-btn:hover { color:var(--accent); }
#attach-btn:disabled { opacity:.3; cursor:default; }
#msg-input { flex:1; background:none; border:none; outline:none; padding:12px 0; font-size:.93rem; color:var(--text-strong); resize:none; }
#msg-input::placeholder { color:var(--text-muted); }
#send-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.3rem; padding:4px 2px; transition:color .15s; line-height:1; flex-shrink:0; }
#send-btn:hover { color:var(--accent); }
#send-btn:disabled { opacity:.3; cursor:default; }

/* Members panel */
#members-panel { width:var(--members-w); background:var(--bg-dark); border-left:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; transition:width .2s ease,opacity .2s ease; overflow:hidden; }
#members-panel.collapsed { width:0; opacity:0; border-left:none; }
#members-panel-inner { width:var(--members-w); padding:12px 10px; overflow-y:auto; flex:1; }
.members-section-label { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); padding:8px 6px 4px; }
.member-row { display:flex; align-items:center; gap:8px; padding:5px 6px; border-radius:4px; }
.member-row:hover { background:var(--bg-light); }
.member-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.member-dot.online { background:var(--green); }
.member-dot.offline { background:var(--text-muted); }
.member-name { font-size:.88rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.msg-placeholder { color:var(--text-muted); font-style:italic; font-size:.85rem; padding:8px 0; }
.spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }
#toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--bg-light); border:1px solid var(--border); border-radius:8px; padding:10px 18px; font-size:.88rem; color:var(--text); transition:transform .25s ease; pointer-events:none; z-index:300; }
#toast.show { transform:translateX(-50%) translateY(0); }
#toast.error { border-color:var(--red); color:var(--red); }
</style>
</head>
<body>

<div id="screen-servers">
  <div class="servers-header"><h1>CHRISCORD</h1><p>Self-hosted chat — your homelab, your rules.</p></div>
  <div class="server-list" id="server-list"></div>
  <button class="btn-add-server" id="open-add-btn">＋  Add a Server</button>
  <p class="empty-hint hidden" id="no-servers-hint">No servers yet — add one above to get started.</p>
</div>

<div class="modal-overlay hidden" id="modal-add">
  <div class="modal">
    <h2>Add a Server</h2>
    <div class="error-msg hidden" id="add-error"></div>
    <div class="form-group"><label>Domain / IP</label><input id="f-domain" type="text" placeholder="chris-domain1.com  or  192.168.1.10:7070" autocomplete="off"><div class="hint">The address of the homelab running chriscord-server.</div></div>
    <div class="form-group"><label>Join Key <span style="font-weight:400;text-transform:none;letter-spacing:0">(leave blank if server is open)</span></label><input id="f-key" type="text" placeholder="e.g. a3f9bc12" autocomplete="off"></div>
    <div class="form-group"><label>Username</label><input id="f-username" type="text" placeholder="How you appear in chat" maxlength="32" autocomplete="off"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancel-add-btn">Cancel</button>
      <button class="btn btn-primary" id="connect-btn">Connect</button>
    </div>
  </div>
</div>

<div id="screen-chat" class="hidden">
  <div id="sidebar">
    <div id="sidebar-header">
      <span class="server-name" id="sidebar-server-name">Server</span>
      <button id="back-btn" title="Back">✕</button>
    </div>
    <div id="room-list"></div>
    <div id="sidebar-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-name" id="user-name-label">username</span>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </div>

  <div id="chat-main">
    <div id="chat-header">
      <span class="no-board" id="board-title-placeholder">Select a board to start chatting</span>
      <button id="toggle-members-btn" title="Toggle member list">👥 Members</button>
    </div>
    <div id="drop-overlay" class="hidden">📂 Drop files to attach</div>
    <div id="messages"></div>
    <div id="input-area">
      <div id="attach-queue" class="empty"></div>
      <div id="input-wrap">
        <button id="attach-btn" disabled title="Attach files (or drag & drop)">＋</button>
        <textarea id="msg-input" rows="1" placeholder="Select a board to chat" disabled></textarea>
        <button id="send-btn" disabled>➤</button>
      </div>
    </div>
  </div>

  <div id="members-panel" class="collapsed">
    <div id="members-panel-inner">
      <div class="members-section-label">Online</div>
      <div id="members-online"></div>
      <div class="members-section-label" style="margin-top:12px">Offline</div>
      <div id="members-offline"></div>
    </div>
  </div>
</div>

<div id="lightbox" class="hidden"><img id="lightbox-img" src="" alt=""></div>
<div id="toast"></div>

<script>
const state = {
  servers:[], rooms:[], boardsByRoom:{},
  expandedRooms: new Set(),
  selectedRoomId:null, selectedBoardId:null,
  username:'', serverName:'',
  messages:[],
  wsConnected:false,
  onlineUsers:[],
  attachQueue:[],     // [{id, filename, url, mime, status:'pending'|'done'|'error'}]
  membersVisible:false,
  activeDropdown:null,
};

const AVATAR_COLOURS=['#7289da','#43b581','#faa61a','#f04747','#1abc9c','#e91e63','#9c27b0','#3f51b5'];
function avatarColour(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;return AVATAR_COLOURS[h%AVATAR_COLOURS.length];}

function showScreen(id){document.querySelectorAll('[id^="screen-"]').forEach(el=>el.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}

let toastTimer;
function toast(msg,isError=false){const el=document.getElementById('toast');el.textContent=msg;el.className='show'+(isError?' error':'');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3500);}

function esc(str){return String(str??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── SERVER LIST ─────────────────────────────────────────────────── */
async function loadServers(){state.servers=await window.go.main.App.GetServers();renderServers();}

function renderServers(){
  const list=document.getElementById('server-list');
  const hint=document.getElementById('no-servers-hint');
  list.innerHTML='';
  if(!state.servers?.length){hint.classList.remove('hidden');return;}
  hint.classList.add('hidden');
  state.servers.forEach(s=>{
    const card=document.createElement('div');card.className='server-card';
    const initial=(s.display_name||s.domain)[0].toUpperCase();
    const colour=avatarColour(s.domain);
    card.innerHTML=`<div class="server-icon" style="background:${colour}">${initial}</div>
      <div class="server-info"><div class="name">${esc(s.display_name||s.domain)}</div><div class="domain">${esc(s.domain)}</div>${s.last_username?`<div class="lastuser">@${esc(s.last_username)}</div>`:''}</div>
      <div class="server-actions">
        <button class="btn btn-ghost btn-sm remove-btn" data-domain="${esc(s.domain)}">✕</button>
        <button class="btn btn-primary btn-sm connect-server-btn" data-domain="${esc(s.domain)}" data-key="${esc(s.server_key)}" data-user="${esc(s.last_username)}">Connect</button>
      </div>`;
    card.querySelector('.connect-server-btn').addEventListener('click',e=>{const{domain,key,user}=e.currentTarget.dataset;user?doConnect(domain,key,user):openAddModal(domain,key);});
    card.querySelector('.remove-btn').addEventListener('click',async e=>{e.stopPropagation();state.servers=await window.go.main.App.RemoveServer(e.currentTarget.dataset.domain);renderServers();});
    list.appendChild(card);
  });
}

/* ── ADD SERVER MODAL ────────────────────────────────────────────── */
function openAddModal(d='',k=''){document.getElementById('f-domain').value=d;document.getElementById('f-key').value=k;document.getElementById('f-username').value='';document.getElementById('add-error').classList.add('hidden');document.getElementById('modal-add').classList.remove('hidden');document.getElementById(d?'f-username':'f-domain').focus();}
function closeAddModal(){document.getElementById('modal-add').classList.add('hidden');}

async function submitAddServer(){
  const domain=document.getElementById('f-domain').value.trim();
  const key=document.getElementById('f-key').value.trim();
  const username=document.getElementById('f-username').value.trim();
  const errEl=document.getElementById('add-error');
  const btn=document.getElementById('connect-btn');
  if(!domain||!username){errEl.textContent='Domain and username are required.';errEl.classList.remove('hidden');return;}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';errEl.classList.add('hidden');
  try{await doConnect(domain,key,username);closeAddModal();}
  catch(err){errEl.textContent=String(err);errEl.classList.remove('hidden');}
  finally{btn.disabled=false;btn.textContent='Connect';}
}

/* ── CONNECT ─────────────────────────────────────────────────────── */
async function doConnect(domain,serverKey,username){
  try{await window.go.main.App.Connect(domain,serverKey,username);}
  catch(err){toast(String(err),true);throw err;}
  state.username=await window.go.main.App.GetUsername();
  state.rooms=[];state.boardsByRoom={};state.expandedRooms=new Set();
  state.selectedRoomId=null;state.selectedBoardId=null;state.messages=[];
  state.onlineUsers=[];state.attachQueue=[];state.wsConnected=true;
  state.servers=await window.go.main.App.GetServers();
  const saved=state.servers.find(s=>s.domain===domain);
  state.serverName=saved?.display_name||domain;
  showChatScreen();await loadRooms();
}

/* ── CHAT SCREEN ─────────────────────────────────────────────────── */
function showChatScreen(){
  showScreen('screen-chat');
  document.getElementById('sidebar-server-name').textContent=state.serverName;
  document.getElementById('user-name-label').textContent=state.username;
  const av=document.getElementById('user-avatar');
  av.textContent=state.username[0].toUpperCase();av.style.background=avatarColour(state.username);
  document.getElementById('board-title-placeholder').className='no-board';
  document.getElementById('board-title-placeholder').textContent='Select a board to start chatting';
  document.getElementById('messages').innerHTML='';
  document.getElementById('msg-input').placeholder='Select a board to chat';
  document.getElementById('msg-input').disabled=true;
  document.getElementById('send-btn').disabled=true;
  document.getElementById('attach-btn').disabled=true;
  clearAttachQueue();
  state.membersVisible=localStorage.getItem('membersVisible')==='true';
  const panel=document.getElementById('members-panel');
  const btn=document.getElementById('toggle-members-btn');
  if(state.membersVisible){panel.classList.remove('collapsed');btn.classList.add('active');}
  else{panel.classList.add('collapsed');btn.classList.remove('active');}
}

async function loadRooms(){
  try{state.rooms=await window.go.main.App.GetRooms()||[];}
  catch(err){toast('Failed to load rooms: '+err,true);state.rooms=[];}
  renderSidebar();
  if(state.rooms.length)toggleRoom(state.rooms[0].id);
}

function renderSidebar(){
  const list=document.getElementById('room-list');list.innerHTML='';
  if(!state.rooms.length){list.innerHTML='<div style="padding:12px 16px;color:var(--text-muted);font-size:.83rem">No rooms yet.<br>Ask the owner to create some.</div>';return;}
  state.rooms.forEach(room=>{
    const isOpen=state.expandedRooms.has(room.id);
    const boards=state.boardsByRoom[room.id]??null;
    const header=document.createElement('div');header.className='room-header';
    header.innerHTML=`<span class="room-arrow ${isOpen?'open':''}">▶</span> ${esc(room.name)}`;
    header.addEventListener('click',()=>toggleRoom(room.id));list.appendChild(header);
    if(isOpen){
      if(boards===null){const l=document.createElement('div');l.style.cssText='padding:4px 12px';l.innerHTML='<span class="spinner" style="width:12px;height:12px;border-width:1.5px"></span>';list.appendChild(l);}
      else if(!boards.length){const e=document.createElement('div');e.style.cssText='padding:4px 24px;font-size:.8rem;color:var(--text-muted)';e.textContent='No boards';list.appendChild(e);}
      else{boards.forEach(board=>{const item=document.createElement('div');item.className='board-item'+(state.selectedBoardId===board.id?' active':'');item.textContent=board.name;item.addEventListener('click',()=>selectBoard(board.id,board.name));list.appendChild(item);});}
    }
  });
}

async function toggleRoom(roomId){
  if(state.expandedRooms.has(roomId)){state.expandedRooms.delete(roomId);renderSidebar();}
  else{
    state.expandedRooms.add(roomId);renderSidebar();
    if(!state.boardsByRoom[roomId]){
      try{state.boardsByRoom[roomId]=await window.go.main.App.GetBoards(roomId)||[];}
      catch{state.boardsByRoom[roomId]=[];}
      renderSidebar();
    }
  }
}

async function selectBoard(boardId,boardName){
  if(state.selectedBoardId===boardId)return;
  state.selectedBoardId=boardId;state.messages=[];clearAttachQueue();
  const hdr=document.getElementById('board-title-placeholder');hdr.className='board-title';hdr.textContent=boardName;
  document.getElementById('msg-input').placeholder=`Message  #${boardName}`;
  document.getElementById('msg-input').disabled=false;document.getElementById('send-btn').disabled=false;document.getElementById('attach-btn').disabled=false;
  document.getElementById('msg-input').focus();
  document.getElementById('messages').innerHTML='<div class="msg-placeholder">Loading history…</div>';
  renderSidebar();
  try{await window.go.main.App.SubscribeBoard(boardId);}catch(err){toast('Subscribe failed: '+err,true);}
}

/* ── MEMBERS ─────────────────────────────────────────────────────── */
function toggleMembers(){
  state.membersVisible=!state.membersVisible;localStorage.setItem('membersVisible',state.membersVisible);
  const panel=document.getElementById('members-panel');const btn=document.getElementById('toggle-members-btn');
  if(state.membersVisible){panel.classList.remove('collapsed');btn.classList.add('active');}
  else{panel.classList.add('collapsed');btn.classList.remove('active');}
}

function renderMembers(payload){
  const online=payload?.online??[];const all=payload?.all??[];
  state.onlineUsers=online;
  const onlineSet=new Set(online);const offline=all.filter(u=>!onlineSet.has(u));
  const onlineEl=document.getElementById('members-online');const offlineEl=document.getElementById('members-offline');
  onlineEl.innerHTML='';offlineEl.innerHTML='';
  function memberRow(name,isOnline){
    const row=document.createElement('div');row.className='member-row';const colour=avatarColour(name);
    row.innerHTML=`<div class="user-avatar" style="background:${colour};width:24px;height:24px;font-size:.7rem;opacity:${isOnline?1:.5}">${name[0].toUpperCase()}</div><span class="member-name" style="opacity:${isOnline?1:.6}">${esc(name)}</span><div class="member-dot ${isOnline?'online':'offline'}" style="margin-left:auto"></div>`;
    return row;
  }
  if(online.length)online.forEach(n=>onlineEl.appendChild(memberRow(n,true)));
  else onlineEl.innerHTML='<div style="font-size:.8rem;color:var(--text-muted);padding:2px 6px">Nobody online</div>';
  if(offline.length)offline.forEach(n=>offlineEl.appendChild(memberRow(n,false)));
  else offlineEl.innerHTML='<div style="font-size:.8rem;color:var(--text-muted);padding:2px 6px">—</div>';
}

/* ── ATTACH QUEUE ────────────────────────────────────────────────── */
let attachIdCounter=0;

function clearAttachQueue(){
  state.attachQueue=[];renderAttachQueue();
}

function renderAttachQueue(){
  const el=document.getElementById('attach-queue');
  el.innerHTML='';
  if(!state.attachQueue.length){el.classList.add('empty');return;}
  el.classList.remove('empty');
  state.attachQueue.forEach(item=>{
    const chip=document.createElement('div');chip.className='attach-chip';chip.dataset.id=item.id;
    const statusText=item.status==='pending'?'uploading…':item.status==='error'?'failed':'✓';
    chip.innerHTML=`<span class="chip-name" title="${esc(item.filename)}">${esc(item.filename)}</span><span class="chip-status">${statusText}</span><button class="chip-remove" data-id="${item.id}">✕</button>`;
    chip.querySelector('.chip-remove').addEventListener('click',e=>{
      e.stopPropagation();const id=e.currentTarget.dataset.id;
      state.attachQueue=state.attachQueue.filter(a=>a.id!==id);renderAttachQueue();
    });
    el.appendChild(chip);
  });
}

async function queueFiles(filePaths){
  for(const path of filePaths){
    const id=++attachIdCounter;
    const filename=path.split(/[\\/]/).pop();
    state.attachQueue.push({id,filename,path,url:null,mime:null,status:'pending'});
    renderAttachQueue();
    try{
      const result=await window.go.main.App.UploadFile(path);
      const item=state.attachQueue.find(a=>a.id===id);
      if(item){item.url=result.url;item.mime=result.mime;item.filename=result.filename;item.status='done';}
    }catch(err){
      const item=state.attachQueue.find(a=>a.id===id);
      if(item)item.status='error';
      toast('Upload failed: '+err,true);
    }
    renderAttachQueue();
  }
}

async function pickAndAttach(){
  const filePaths=await window.go.main.App.PickFiles();
  if(filePaths&&filePaths.length)await queueFiles(filePaths);
}

/* ── DRAG & DROP ─────────────────────────────────────────────────── */
function initDragDrop(){
  const main=document.getElementById('chat-main');
  const overlay=document.getElementById('drop-overlay');
  let dragCounter=0;
  main.addEventListener('dragenter',e=>{
    if(!state.selectedBoardId)return;
    e.preventDefault();dragCounter++;overlay.classList.remove('hidden');
  });
  main.addEventListener('dragleave',()=>{dragCounter--;if(dragCounter<=0){dragCounter=0;overlay.classList.add('hidden');}});
  main.addEventListener('dragover',e=>e.preventDefault());
  main.addEventListener('drop',async e=>{
    e.preventDefault();dragCounter=0;overlay.classList.add('hidden');
    if(!state.selectedBoardId)return;
    const paths=[];
    for(const item of e.dataTransfer.items){
      if(item.kind==='file'){
        // Wails provides the native path via getAsFile().path on desktop
        const f=item.getAsFile();
        if(f&&f.path)paths.push(f.path);
      }
    }
    if(paths.length)await queueFiles(paths);
  });
}

/* ── MESSAGES ────────────────────────────────────────────────────── */
function renderMessages(){
  const c=document.getElementById('messages');c.innerHTML='';
  if(!state.messages.length){c.innerHTML='<div class="msg-placeholder">No messages yet. Say hi!</div>';return;}
  state.messages.forEach(m=>c.appendChild(buildMsgEl(m)));
  c.scrollTop=c.scrollHeight;
}

function appendMessage(msg){
  const c=document.getElementById('messages');
  c.querySelector('.msg-placeholder')?.remove();
  c.appendChild(buildMsgEl(msg));c.scrollTop=c.scrollHeight;
}

function buildMsgEl(msg){
  const colour=avatarColour(msg.username);
  const initial=msg.username[0].toUpperCase();
  const time=formatTime(msg.created_at);
  const isOwn=msg.username===state.username;

  const div=document.createElement('div');
  div.className='msg-group';div.dataset.id=msg.id;
  div.innerHTML=`
    <div class="msg-avatar" style="background:${colour}">${initial}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-username">${esc(msg.username)}</span>
        <span class="msg-time">${time}</span>
        ${msg.edited?'<span class="msg-edited-tag">(edited)</span>':''}
      </div>
      ${msg.content?`<div class="msg-content">${esc(msg.content)}</div>`:''}
    </div>
    ${isOwn?`<div class="msg-actions"><button class="msg-action-btn" title="More options">⋯</button></div>`:''}`;

  // Attachment
  if(msg.attachment_url){
    const mime=msg.attachment_mime||'';const body=div.querySelector('.msg-body');
    if(mime.startsWith('image/')){
      const img=document.createElement('img');img.className='msg-image';img.alt=msg.attachment_name||'image';
      resolveAttachURL(msg.attachment_url).then(url=>{img.src=url;});
      img.addEventListener('click',()=>openLightbox(img.src));body.appendChild(img);
    }else if(mime.startsWith('video/')){
      const vid=document.createElement('video');vid.className='msg-video';vid.controls=true;vid.preload='metadata';
      resolveAttachURL(msg.attachment_url).then(url=>{vid.src=url;});body.appendChild(vid);
    }else if(mime.startsWith('audio/')){
      const aud=document.createElement('audio');aud.className='msg-audio';aud.controls=true;
      resolveAttachURL(msg.attachment_url).then(url=>{aud.src=url;});body.appendChild(aud);
    }else{
      const chip=document.createElement('div');chip.className='msg-file-chip';
      chip.innerHTML=`<span>📄</span><span class="fname">${esc(msg.attachment_name||'File')}</span><span style="color:var(--text-muted);font-size:.75rem;margin-left:4px">↓ download</span>`;
      chip.addEventListener('click',async()=>{const url=await resolveAttachURL(msg.attachment_url);window.open(url,'_blank');});
      body.appendChild(chip);
    }
  }

  // 3-dot menu button wiring
  if(isOwn){
    div.querySelector('.msg-action-btn')?.addEventListener('click',e=>{
      e.stopPropagation();toggleDropdown(div,msg);
    });
  }
  return div;
}

/* ── 3-DOT DROPDOWN ──────────────────────────────────────────────── */
function toggleDropdown(msgEl,msg){
  closeDropdown();
  const existing=msgEl.querySelector('.msg-dropdown');
  if(existing){existing.remove();state.activeDropdown=null;return;}

  const dd=document.createElement('div');dd.className='msg-dropdown';

  const editItem=document.createElement('div');editItem.className='msg-dropdown-item';editItem.innerHTML='✏️ Edit message';
  editItem.addEventListener('click',()=>{closeDropdown();startEdit(msgEl,msg);});

  const delItem=document.createElement('div');delItem.className='msg-dropdown-item danger';delItem.innerHTML='🗑️ Delete message';
  delItem.addEventListener('click',async()=>{
    closeDropdown();
    try{
      await window.go.main.App.DeleteMessage(msg.id);
      // Optimistic removal — WS will confirm
      msgEl.remove();
      state.messages=state.messages.filter(m=>m.id!==msg.id);
    }catch(err){toast('Delete failed: '+err,true);}
  });

  dd.appendChild(editItem);dd.appendChild(delItem);
  msgEl.querySelector('.msg-actions').appendChild(dd);
  state.activeDropdown=dd;
}

function closeDropdown(){
  document.querySelectorAll('.msg-dropdown').forEach(d=>d.remove());
  state.activeDropdown=null;
}

/* ── INLINE EDIT ─────────────────────────────────────────────────── */
function startEdit(msgEl,msg){
  const contentEl=msgEl.querySelector('.msg-content');
  if(!contentEl)return;
  const original=msg.content;
  contentEl.style.display='none';

  const wrap=document.createElement('div');wrap.className='msg-edit-wrap';
  const ta=document.createElement('textarea');ta.className='msg-edit-input';ta.value=original;ta.rows=Math.min(original.split('\n').length+1,8);
  const actions=document.createElement('div');actions.className='msg-edit-actions';
  const saveBtn=document.createElement('button');saveBtn.className='msg-edit-save';saveBtn.textContent='Save';
  const cancelBtn=document.createElement('button');cancelBtn.className='msg-edit-cancel';cancelBtn.textContent='Cancel';

  cancelBtn.addEventListener('click',()=>{wrap.remove();contentEl.style.display='';});
  saveBtn.addEventListener('click',async()=>{
    const newContent=ta.value.trim();
    if(!newContent||newContent===original){wrap.remove();contentEl.style.display='';return;}
    try{
      await window.go.main.App.EditMessage(msg.id,newContent);
      // Optimistic update
      contentEl.textContent=newContent;
      msg.content=newContent;
      const metaEl=msgEl.querySelector('.msg-meta');
      if(!metaEl.querySelector('.msg-edited-tag')){
        const tag=document.createElement('span');tag.className='msg-edited-tag';tag.textContent='(edited)';
        metaEl.appendChild(tag);
      }
      wrap.remove();contentEl.style.display='';
    }catch(err){toast('Edit failed: '+err,true);}
  });

  ta.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveBtn.click();}
    if(e.key==='Escape')cancelBtn.click();
  });

  actions.appendChild(saveBtn);actions.appendChild(cancelBtn);
  wrap.appendChild(ta);wrap.appendChild(actions);
  msgEl.querySelector('.msg-body').insertBefore(wrap,contentEl.nextSibling);
  ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);
}

/* ── SEND ────────────────────────────────────────────────────────── */
async function sendMessage(){
  const input=document.getElementById('msg-input');
  const content=input.value.trim();
  const readyAttachments=state.attachQueue.filter(a=>a.status==='done');
  if(!content&&!readyAttachments.length)return;
  if(!state.selectedBoardId)return;
  if(state.attachQueue.some(a=>a.status==='pending')){toast('Still uploading, please wait…');return;}

  input.value='';autoResize(input);

  // Send one message per attachment, plus a text-only message if there's content with no attachments
  if(readyAttachments.length){
    for(let i=0;i<readyAttachments.length;i++){
      const a=readyAttachments[i];
      const msgContent=(i===0&&content)?content:'';
      try{await window.go.main.App.SendMessage(state.selectedBoardId,msgContent,a.url,a.filename,a.mime);}
      catch(err){toast('Send failed: '+err,true);}
    }
    // If there's text but also attachments, text was sent with first attachment above
  }else{
    try{await window.go.main.App.SendMessage(state.selectedBoardId,content,null,null,null);}
    catch(err){toast('Send failed: '+err,true);input.value=content;return;}
  }
  clearAttachQueue();
}

async function goBack(){
  state.wsConnected=false;await window.go.main.App.Disconnect();
  state.servers=await window.go.main.App.GetServers();renderServers();showScreen('screen-servers');
}

async function resolveAttachURL(relOrAbs){
  if(relOrAbs?.startsWith('http'))return relOrAbs;
  return await window.go.main.App.GetFileURL(relOrAbs);
}

function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.remove('hidden');}
function formatTime(iso){if(!iso)return'';try{return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}catch{return'';}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

/* ── WAILS INIT ──────────────────────────────────────────────────── */
window.addEventListener('load',()=>{const ready=setInterval(()=>{if(window.runtime&&window.go){clearInterval(ready);init();}},50);});

function init(){
  window.runtime.EventsOn('chat:history',payload=>{
    const msgs=Array.isArray(payload)?payload:(payload?.messages??[]);
    const boardId=payload?.board_id??null;
    if(boardId&&boardId!==state.selectedBoardId)return;
    state.messages=msgs;renderMessages();
  });

  window.runtime.EventsOn('chat:message',msg=>{
    if(msg?.board_id===state.selectedBoardId){state.messages.push(msg);appendMessage(msg);}
  });

  window.runtime.EventsOn('chat:edit',ev=>{
    if(!ev||ev.board_id!==state.selectedBoardId)return;
    const m=state.messages.find(m=>m.id===ev.id);
    if(m){m.content=ev.content;m.edited=true;}
    const el=document.querySelector(`.msg-group[data-id="${CSS.escape(ev.id)}"]`);
    if(el){
      const c=el.querySelector('.msg-content');if(c)c.textContent=ev.content;
      const meta=el.querySelector('.msg-meta');
      if(meta&&!meta.querySelector('.msg-edited-tag')){const t=document.createElement('span');t.className='msg-edited-tag';t.textContent='(edited)';meta.appendChild(t);}
    }
  });

  window.runtime.EventsOn('chat:delete',ev=>{
    if(!ev||ev.board_id!==state.selectedBoardId)return;
    state.messages=state.messages.filter(m=>m.id!==ev.id);
    document.querySelector(`.msg-group[data-id="${CSS.escape(ev.id)}"]`)?.remove();
  });

  window.runtime.EventsOn('chat:users',payload=>renderMembers(payload||{}));

  window.runtime.EventsOn('ws:disconnected',()=>{
    if(state.wsConnected){toast('Disconnected from server',true);document.getElementById('status-dot').style.background='var(--red)';}
  });

  // UI listeners
  document.getElementById('open-add-btn').addEventListener('click',()=>openAddModal());
  document.getElementById('cancel-add-btn').addEventListener('click',closeAddModal);
  document.getElementById('connect-btn').addEventListener('click',submitAddServer);
  document.getElementById('back-btn').addEventListener('click',goBack);
  document.getElementById('send-btn').addEventListener('click',sendMessage);
  document.getElementById('attach-btn').addEventListener('click',pickAndAttach);
  document.getElementById('toggle-members-btn').addEventListener('click',toggleMembers);

  document.getElementById('msg-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
  document.getElementById('msg-input').addEventListener('input',e=>autoResize(e.target));

  document.getElementById('modal-add').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAddModal();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeAddModal();closeDropdown();}});
  document.addEventListener('click',()=>closeDropdown());

  document.getElementById('lightbox').addEventListener('click',()=>document.getElementById('lightbox').classList.add('hidden'));
  ['f-domain','f-key','f-username'].forEach(id=>{document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')submitAddServer();});});

  initDragDrop();
  loadServers();
  showScreen('screen-servers');
}
</script>
